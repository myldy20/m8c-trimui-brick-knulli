name: Build SDL3 fbdev experiment

on:
  push:
    branches:
      - experiment/sdl3-fbdev-bridge
    paths:
      - ".github/workflows/build-sdl3-fbdev-experiment.yml"
      - "experiments/sdl3-fbdev/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-sdl3-fbdev-experiment.yml"
      - "experiments/sdl3-fbdev/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: build-sdl3-fbdev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out experiment branch
        uses: actions/checkout@v4

      - name: Download tested r2 package for its ARM64 SDL3 library
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            repos/myldy20/m8c-trimui-brick-knulli/actions/artifacts/8339269945/zip \
            > prebuilt-r2-artifact.zip
          mkdir -p prebuilt-r2-artifact prebuilt-r2
          unzip -q prebuilt-r2-artifact.zip -d prebuilt-r2-artifact
          unzip -q \
            prebuilt-r2-artifact/m8c-223-fb-test-2.2.3-r2.zip \
            -d prebuilt-r2
          test -f \
            prebuilt-r2/m8c-223-fb-test-2.2.3-r2/roms/ports/m8c-223-fb-test/lib/libSDL3.so.0

      - name: Enable ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build m8c r3 inside disposable Debian ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -e M8C_VERSION=2.2.3 \
            -e SDL_VERSION=3.2.20 \
            -e PACKAGE_REVISION=3 \
            -e OUT_DIR=/work/dist-fbdev \
            -e PREBUILT_R2_DIR=/work/prebuilt-r2 \
            -v "$PWD:/work" \
            -w /work \
            arm64v8/debian:bullseye \
            bash /work/experiments/sdl3-fbdev/build-fast-r3.sh

      - name: Validate package contents
        run: |
          PACKAGE_NAME="$(cat dist-fbdev/package-name.txt)"
          unzip -l "dist-fbdev/${PACKAGE_NAME}.zip"
          cat "dist-fbdev/${PACKAGE_NAME}.zip.sha256"

      - name: Upload non-destructive test package
        uses: actions/upload-artifact@v4
        with:
          name: m8c-223-fb-test-r3
          path: |
            dist-fbdev/*.zip
            dist-fbdev/*.zip.sha256
          if-no-files-found: error
